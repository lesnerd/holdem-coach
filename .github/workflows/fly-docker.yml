name: Build & Publish to Fly Registry

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: fly-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish to Fly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          REGISTRY="${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker"
          IMAGE_NAME="holdem-coach"
          
          TAGS=""
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="${REGISTRY}/${IMAGE_NAME}:latest"
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            TAG_NAME="${{ github.ref_name }}"
            TAGS="${REGISTRY}/${IMAGE_NAME}:${TAG_NAME}"
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:latest"
          else
            BRANCH_NAME="${{ github.ref_name }}"
            TAGS="${REGISTRY}/${IMAGE_NAME}:${BRANCH_NAME}-${{ github.sha }}"
          fi
          
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: Build image (load to local docker for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        shell: bash
        run: |
          set -euo pipefail
          # meta.outputs.tags is comma-separated; normalize to newlines and take the first.
          tag="$(printf '%s' "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | head -n1)"
          echo "Running smoke test against: $tag"
          docker run -d --name smoke -p 8080:80 "$tag"

          ready=0
          for _ in $(seq 1 30); do
            if curl -fsS -o /tmp/index.html -w '' http://localhost:8080/; then
              ready=1
              break
            fi
            sleep 1
          done

          if [ "$ready" -ne 1 ]; then
            echo "App did not become ready in time"
            docker logs smoke || true
            exit 1
          fi

          if ! grep -q "Hold'em Coach" /tmp/index.html; then
            echo "index.html does not contain expected title"
            exit 1
          fi

          code="$(curl -s -o /tmp/fallback.html -w '%{http_code}' http://localhost:8080/some/deep/route)"
          if [ "$code" != "200" ] || ! diff -q /tmp/index.html /tmp/fallback.html >/dev/null; then
            echo "SPA fallback failed (code=$code)"
            exit 1
          fi

          echo "Smoke test passed"
          docker rm -f smoke

      - name: Push image to Fly Registry
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          # meta.outputs.tags is comma-separated; iterate one tag per line.
          printf '%s' "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Pushing $tag"
            docker push "$tag"
          done

      - name: Job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Fly Docker Build Summary"
            echo ""
            echo "**Event:** \`${{ github.event_name }}\`"
            echo "**Ref:** \`${{ github.ref }}\`"
            echo "**Registry:** \`${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker\`"
            echo ""
            echo "### Tags"
            echo '```'
            printf '%s' "${{ steps.meta.outputs.tags }}" | tr ',' '\n'
            echo '```'
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo ""
              echo "_PR build — image was built and smoke-tested but not pushed._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
