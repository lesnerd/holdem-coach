name: Build & Publish to Fly Registry

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: fly-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish to Fly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Compute release metadata
        id: release
        shell: bash
        run: |
          REGISTRY="${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker"
          IMAGE_NAME="holdem-coach"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION="${{ github.sha }}"
            TAGS="${REGISTRY}/${IMAGE_NAME}:latest"
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            VERSION="${{ github.ref_name }}"
            TAGS="${REGISTRY}/${IMAGE_NAME}:${VERSION}"
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:latest"
          else
            VERSION="${{ github.ref_name }}-${{ github.sha }}"
            TAGS="${REGISTRY}/${IMAGE_NAME}:${{ github.ref_name }}-${{ github.sha }}"
          fi

          ARCHIVE="holdem-coach-${VERSION}.tar.gz"

          {
            echo "version=${VERSION}"
            echo "archive=${ARCHIVE}"
            echo "tags=${TAGS}"
            echo "registry=${REGISTRY}"
            echo "is_tag=$([[ '${{ github.ref }}' =~ ^refs/tags/v ]] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      - name: Build static app and create release archive
        # Static tarball for third-party distribution (generic Fly package).
        # Docker image build/push continues below — this does not replace it.
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build
          ARCHIVE="${{ steps.release.outputs.archive }}"
          tar -czf "$ARCHIVE" -C dist .
          echo "Created ${ARCHIVE} ($(du -h "$ARCHIVE" | cut -f1))"
          tar -tzf "$ARCHIVE" | head -20
          LISTING="$(tar -tzf "$ARCHIVE" | sed 's|^\./||')"
          if ! echo "$LISTING" | grep -qx 'index.html'; then
            echo "Archive missing index.html at root"
            exit 1
          fi
          if ! echo "$LISTING" | grep -q '^assets/'; then
            echo "Archive missing assets/ directory"
            exit 1
          fi

      - name: Upload release archive to Fly
        if: github.event_name != 'pull_request'
        uses: jfrog/fly-action/upload@v1
        with:
          name: holdem-coach
          version: ${{ steps.release.outputs.version }}
          files: |
            ${{ steps.release.outputs.archive }}

      - name: Distribute release archive publicly
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        uses: jfrog/fly-action/distribute@v1
        with:
          name: holdem-coach
          version: ${{ steps.release.outputs.version }}
          type: generic

      - name: Set up Docker Buildx
        # Docker image — still built and pushed on every non-PR run.
        uses: docker/setup-buildx-action@v4

      - name: Build image (load to local docker for smoke test)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.release.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        shell: bash
        run: |
          set -euo pipefail
          tag="$(printf '%s\n' "${{ steps.release.outputs.tags }}" | tr ',' '\n' | head -n1)"
          echo "Running smoke test against: $tag"
          docker run -d --name smoke -p 8080:80 "$tag"

          ready=0
          for _ in $(seq 1 30); do
            if curl -fsS -o /tmp/index.html -w '' http://localhost:8080/; then
              ready=1
              break
            fi
            sleep 1
          done

          if [ "$ready" -ne 1 ]; then
            echo "App did not become ready in time"
            docker logs smoke || true
            exit 1
          fi

          if ! grep -q "Hold'em Coach" /tmp/index.html; then
            echo "index.html does not contain expected title"
            exit 1
          fi

          code="$(curl -s -o /tmp/fallback.html -w '%{http_code}' http://localhost:8080/some/deep/route)"
          if [ "$code" != "200" ] || ! diff -q /tmp/index.html /tmp/fallback.html >/dev/null; then
            echo "SPA fallback failed (code=$code)"
            exit 1
          fi

          echo "Smoke test passed"
          docker rm -f smoke

      - name: Push image to Fly Registry
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${{ steps.release.outputs.tags }}" | tr ',' '\n' | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Pushing $tag"
            docker push "$tag"
          done

      - name: Record deployment in Fly github_production
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        env:
          FLY_ENV_USER: ${{ secrets.FLY_USERNAME }}
          FLY_ENV_TOKEN: ${{ secrets.FLY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY="${FLY_REGISTRY_SUBDOMAIN}"
          TAG="${{ steps.release.outputs.version }}"
          MANIFEST_URL="https://${REGISTRY}/fly/v2/docker/holdem-coach/manifests/${TAG}"
          ACCEPT='application/vnd.docker.distribution.manifest.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json'

          code="$(curl -s -o /dev/null -w '%{http_code}' \
            -u "${FLY_ENV_USER}:${FLY_ENV_TOKEN}" \
            -H "Accept: ${ACCEPT}" \
            "${MANIFEST_URL}")"
          if [ "$code" != "200" ]; then
            echo "Expected manifest for holdem-coach:${TAG}, got HTTP ${code}" >&2
            exit 1
          fi
          curl -fsS -u "${FLY_ENV_USER}:${FLY_ENV_TOKEN}" \
            -H "Accept: ${ACCEPT}" \
            -o /dev/null \
            "${MANIFEST_URL}"
          echo "Recorded pull for holdem-coach:${TAG} in github_production"

      - name: Job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Fly Release Summary"
            echo ""
            echo "**Event:** \`${{ github.event_name }}\`"
            echo "**Ref:** \`${{ github.ref }}\`"
            echo "**Version:** \`${{ steps.release.outputs.version }}\`"
            echo "**Archive:** \`${{ steps.release.outputs.archive }}\`"
            echo ""
            echo "### Docker tags"
            echo '```'
            printf '%s\n' "${{ steps.release.outputs.tags }}" | tr ',' '\n'
            echo '```'
            if [ "${{ github.event_name }}" != "pull_request" ]; then
              echo ""
              echo "### Generic archive (Fly)"
              echo "- Package: \`holdem-coach\`"
              echo "- Version: \`${{ steps.release.outputs.version }}\`"
              if [[ "${{ steps.release.outputs.is_tag }}" == "true" ]]; then
                echo "- Public download: \`${{ env.FLY_REGISTRY_SUBDOMAIN }}/public/generic/holdem-coach/${{ steps.release.outputs.version }}/${{ steps.release.outputs.archive }}\`"
                echo "- Latest public: \`${{ env.FLY_REGISTRY_SUBDOMAIN }}/public/generic/holdem-coach/[LATEST]/${{ steps.release.outputs.archive }}\`"
              fi
            fi
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo ""
              echo "_PR build — archive and image were built and smoke-tested but not pushed._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
