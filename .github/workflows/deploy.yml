name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # OIDC -> Fly access token, auto-configures npm to resolve through the Fly registry.
      - uses: jfrog/fly-action@v1

      - run: npm ci

      - run: npm run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

      # Record this Pages deploy in Fly runtime environment github_production.
      # Uses an environment-scoped pull token (FLY_USERNAME / FLY_TOKEN secrets).
      # Retries until fly-docker.yml finishes pushing the matching image.
      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - name: Record deployment in Fly github_production
        env:
          FLY_ENV_USER: ${{ secrets.FLY_USERNAME }}
          FLY_ENV_TOKEN: ${{ secrets.FLY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY="${FLY_REGISTRY_SUBDOMAIN}"
          TAG="${{ github.sha }}"
          MANIFEST_URL="https://${REGISTRY}/fly/v2/docker/holdem-coach/manifests/${TAG}"
          ACCEPT='application/vnd.docker.distribution.manifest.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json'

          for attempt in $(seq 1 36); do
            code="$(curl -s -o /dev/null -w '%{http_code}' \
              -u "${FLY_ENV_USER}:${FLY_ENV_TOKEN}" \
              -H "Accept: ${ACCEPT}" \
              "${MANIFEST_URL}")"
            if [ "$code" = "200" ]; then
              curl -fsS -u "${FLY_ENV_USER}:${FLY_ENV_TOKEN}" \
                -H "Accept: ${ACCEPT}" \
                -o /dev/null \
                "${MANIFEST_URL}"
              echo "Recorded pull for holdem-coach:${TAG} in github_production (attempt ${attempt})"
              exit 0
            fi
            echo "Image not ready yet (HTTP ${code}), waiting... (attempt ${attempt}/36)"
            sleep 10
          done

          echo "Timed out waiting for holdem-coach:${TAG}" >&2
          exit 1
