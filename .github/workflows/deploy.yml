name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # OIDC -> Fly access token, auto-configures npm to resolve through the Fly registry.
      - uses: jfrog/fly-action@v1

      - run: npm ci

      - run: npm run build

      # Track the Pages build as a Fly release so it shows up alongside Docker images.
      - uses: jfrog/fly-action/upload@v1
        with:
          name: holdem-coach-pages
          version: ${{ github.sha }}
          files: |
            dist/**

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
