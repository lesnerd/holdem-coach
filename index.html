<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#12121e" />
    <meta name="description" content="Interactive Texas Hold'em poker trainer with live equity calculation and a strategy coach." />
    <title>Hold'em Coach</title>
    <script>
      (function () {
        var key = 'holdem-coach-theme';
        var theme = 'dark';
        try {
          var stored = localStorage.getItem(key);
          if (stored === 'dark' || stored === 'light') theme = stored;
          else if (window.matchMedia('(prefers-color-scheme: light)').matches) theme = 'light';
        } catch (e) {}
        document.documentElement.dataset.theme = theme;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = theme === 'light' ? '#edf4ea' : '#12121e';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
