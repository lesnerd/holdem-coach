services:
  # Production build served by nginx.
  # Usage: docker compose up --build  ->  http://localhost:8080
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: holdem-coach:latest
    container_name: holdem-coach
    ports:
      - "8080:80"
    restart: unless-stopped

  # Optional dev server with hot reload.
  # Usage: docker compose --profile dev up  ->  http://localhost:5173
  dev:
    profiles: ["dev"]
    image: node:20-alpine
    working_dir: /app
    command: sh -c "if [ -f package-lock.json ]; then npm ci; else npm install; fi && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
